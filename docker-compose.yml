version: '3.8'

services:
  # ── STRAPI (CMS) ─────────────────────────────
  strapi:
    build: ./cms
    container_name: surf-strapi
    restart: unless-stopped
    ports:
      - "1337:1337"
    volumes:
      # Persistir base de datos y uploads
      - strapi-data:/app/.tmp
      - strapi-uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=1337
      - APP_KEYS=${APP_KEYS}
      - API_TOKEN_SALT=${API_TOKEN_SALT}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - TRANSFER_TOKEN_SALT=${TRANSFER_TOKEN_SALT}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_CLIENT=sqlite
      - DATABASE_FILENAME=.tmp/data.db
    networks:
      - surf-network

  # ── ASTRO (Frontend) ─────────────────────────
  astro:
    build: ./frontend
    container_name: surf-astro
    restart: unless-stopped
    ports:
      - "4321:80"
    depends_on:
      - strapi
    networks:
      - surf-network

  # ── NGINX REVERSE PROXY ──────────────────────
  nginx:
    image: nginx:alpine
    container_name: surf-nginx
    restart: unless-stopped
    ports:
      # Puerto 8080 expuesto al exterior (cambia si lo necesitas)
      - "8080:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - strapi
      - astro
    networks:
      - surf-network

volumes:
  strapi-data:
  strapi-uploads:

networks:
  surf-network:
    driver: bridge